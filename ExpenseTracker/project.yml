name: ExpenseTracker
options:
  bundleIdPrefix: com.expensetracker
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  ExpenseTrackerShared:
    type: framework
    platform: [iOS, macOS]
    sources:
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.shared
        PRODUCT_MODULE_NAME: ExpenseTracker
        INFOPLIST_GENERATION: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: true
    scheme:
      testTargets:
        - ExpenseTrackerTests

  ExpenseTrackerMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacApp
    dependencies:
      - target: ExpenseTrackerShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.mac
        INFOPLIST_GENERATION: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Expense Tracker"
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: MacApp/ExpenseTrackerMac.entitlements
    entitlements:
      path: MacApp/ExpenseTrackerMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  ExpenseTrackerMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MobileApp
    dependencies:
      - target: ExpenseTrackerShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.mobile
        INFOPLIST_GENERATION: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Expense Tracker"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Expense Tracker uses the local network to sync data with the macOS app."
        INFOPLIST_KEY_NSBonjourServices:
          - _exp-tracker._tcp
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: MobileApp/ExpenseTrackerMobile.entitlements
    entitlements:
      path: MobileApp/ExpenseTrackerMobile.entitlements
      properties:
        com.apple.security.network.client: true

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - path: Shared/Tests
    dependencies:
      - target: ExpenseTrackerShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.tests
        INFOPLIST_GENERATION: true
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: false

schemes:
  ExpenseTrackerMac:
    build:
      targets:
        ExpenseTrackerMac: all
        ExpenseTrackerShared: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ExpenseTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ExpenseTrackerMobile:
    build:
      targets:
        ExpenseTrackerMobile: all
        ExpenseTrackerShared: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ExpenseTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
